<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch a Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    
    <div id="grid-container"></div>

    <button id="pixelInput">Change Pixel Density</button>

    <span>Choose a Color</span>
    <ul id="customColor">
        <li data-choice="black"></li>
        <li data-choice="grey"></li>
        <li data-choice="green"></li>
        <li data-choice="pink"></li>
        <li data-choice="blue"></li>
        <li data-choice="purple"></li>
    </ul>
    
    <button id="randomColors">Randomize Colors</button>
    <button id="reset">Reset</button>
    

</body>
</html>
